openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Booomerangs CRM API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clients
    description: Client management operations
  - name: ai-search
    description: AI-powered search operations
  - name: vk-search
    description: VK groups search operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: region
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/stats:
    get:
      operationId: getClientsStats
      tags: [clients]
      summary: Get aggregated client statistics
      responses:
        "200":
          description: Client statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientStats"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a single client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update an existing client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientBody"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vk-search:
    post:
      operationId: vkSearchGroups
      tags: [vk-search]
      summary: Search VK groups for potential clients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VkSearchBody"
      responses:
        "200":
          description: VK search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VkSearchResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: VK token not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai-search:
    post:
      operationId: aiSearchClients
      tags: [ai-search]
      summary: AI-powered natural language search for clients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSearchBody"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSearchResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Client:
      type: object
      properties:
        id:
          type: integer
        companyName:
          type: string
        contactName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        region:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
        orderVolume:
          type: ["integer", "null"]
        lastOrderDate:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - companyName
        - status
        - createdAt
        - updatedAt

    CreateClientBody:
      type: object
      properties:
        companyName:
          type: string
        contactName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        region:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
        orderVolume:
          type: ["integer", "null"]
      required:
        - companyName
        - status

    UpdateClientBody:
      type: object
      properties:
        companyName:
          type: string
        contactName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        region:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
        orderVolume:
          type: ["integer", "null"]

    ClientStats:
      type: object
      properties:
        total:
          type: integer
        active:
          type: integer
        inactive:
          type: integer
        prospect:
          type: integer
        byRegion:
          type: array
          items:
            $ref: "#/components/schemas/RegionCount"
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        totalOrderVolume:
          type: integer
      required:
        - total
        - active
        - inactive
        - prospect
        - byRegion
        - byCategory
        - totalOrderVolume

    RegionCount:
      type: object
      properties:
        region:
          type: string
        count:
          type: integer
      required:
        - region
        - count

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required:
        - category
        - count

    AiSearchBody:
      type: object
      properties:
        query:
          type: string
      required:
        - query

    InternetClient:
      type: object
      properties:
        companyName:
          type: string
        city:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        sourceUrl:
          type: ["string", "null"]
        instagram:
          type: ["string", "null"]
        vk:
          type: ["string", "null"]
        telegram:
          type: ["string", "null"]
      required:
        - companyName

    AiSearchResult:
      type: object
      properties:
        internetResults:
          type: array
          items:
            $ref: "#/components/schemas/InternetClient"
        explanation:
          type: string
        query:
          type: string
      required:
        - internetResults
        - explanation
        - query

    VkSearchBody:
      type: object
      properties:
        query:
          type: string
        city:
          type: ["string", "null"]
      required:
        - query

    VkGroupResult:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        vkUrl:
          type: string
        description:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        membersCount:
          type: ["integer", "null"]
        photo:
          type: ["string", "null"]
      required:
        - id
        - name
        - vkUrl

    VkSearchResult:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/VkGroupResult"
        query:
          type: string
        total:
          type: integer
      required:
        - groups
        - query
        - total

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
