<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>VK Auth</title></head>
<body>
<p style="font-family:sans-serif;text-align:center;margin-top:40px">Подключение ВКонтакте...</p>
<script>
  (function() {
    var hash = window.location.hash.substring(1);
    var params = {};
    hash.split('&').forEach(function(part) {
      var kv = part.split('=');
      if (kv.length === 2) params[kv[0]] = decodeURIComponent(kv[1]);
    });

    if (params.access_token) {
      fetch('/api/vk-oauth/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: params.access_token })
      })
      .then(function(r) { return r.json(); })
      .then(function() {
        if (window.opener) {
          window.opener.postMessage({ type: 'vk_oauth_success' }, '*');
        }
        document.body.innerHTML = '<p style="font-family:sans-serif;text-align:center;margin-top:40px;color:green">✓ ВКонтакте подключён! Это окно закроется автоматически.</p>';
        setTimeout(function() { window.close(); }, 1500);
      })
      .catch(function(e) {
        if (window.opener) {
          window.opener.postMessage({ type: 'vk_oauth_error', error: 'save_failed' }, '*');
        }
        window.close();
      });
    } else if (params.error) {
      if (window.opener) {
        window.opener.postMessage({ type: 'vk_oauth_error', error: params.error_description || params.error }, '*');
      }
      document.body.innerHTML = '<p style="font-family:sans-serif;text-align:center;margin-top:40px;color:red">Ошибка: ' + (params.error_description || params.error) + '</p>';
      setTimeout(function() { window.close(); }, 2000);
    } else {
      if (window.opener) {
        window.opener.postMessage({ type: 'vk_oauth_error', error: 'no_token' }, '*');
      }
      window.close();
    }
  })();
</script>
</body>
</html>
